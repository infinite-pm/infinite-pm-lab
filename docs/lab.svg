<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="870" height="700" viewBox="188 8 870 700" role="img" aria-label="The infinite.pm laboratory: an Erlenmeyer flask whose conical body holds the ipm γ(3,4) etc-LPXN triangle (event, thing, concept), flanked by lab glassware, with rising bubbles.">
  <title>lab.infinite.pm — the γ(3,4) flask</title>

  <!--
    Laboratory hero for lab.infinite.pm.
    The flask's conical (triangular) body holds the ipm etc-LPXN triangle.
    The triangle graphics are inlined from docs/etc-LPXN.svg (generated by cmd/etc-triangle-gen)
    so this file still renders when used as <img>; re-sync if etc-LPXN.svg is regenerated.
    Palette: event #ff8000 · thing #4d8a3a/#82b366 · concept #6c8ebf/#3a78c2.
  -->

  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#eef2f8" stop-opacity="0.5"/>
      <stop offset="1"   stop-color="#e3e9f2" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="glowO" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff8000" stop-opacity="0.14"/><stop offset="1" stop-color="#ff8000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4d8a3a" stop-opacity="0.14"/><stop offset="1" stop-color="#4d8a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6c8ebf" stop-opacity="0.14"/><stop offset="1" stop-color="#6c8ebf" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clipFlask">
      <path d="M566 250 L566 178 L556 168 L556 152 L644 152 L644 168 L634 178 L634 250 L790 560 Q792 590 762 590 L438 590 Q408 590 410 560 Z"/>
    </clipPath>
  </defs>

  <!-- ambient tri-colour halo behind the flask -->
  <g>
    <circle cx="600" cy="330" r="280" fill="url(#glowO)"/>
    <circle cx="500" cy="540" r="240" fill="url(#glowG)"/>
    <circle cx="700" cy="540" r="240" fill="url(#glowB)"/>
  </g>

  <!-- ===== LEFT: test tube (green-tinted glassware) ===== -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <clipPath id="clipTube"><path d="M214 206 L214 498 Q214 522 238 522 Q262 522 262 498 L262 206 Z"/></clipPath>
    <g clip-path="url(#clipTube)">
      <path d="M210 372 Q238 362 266 372 L266 526 L210 526 Z" fill="#d5e8d4" opacity="0.85"/>
      <path d="M210 372 Q238 362 266 372" fill="none" stroke="#82b366" stroke-width="2.5" opacity="0.8"/>
    </g>
    <path d="M214 206 L214 498 Q214 522 238 522 Q262 522 262 498 L262 206 Z" fill="url(#glass)" stroke="#aab2c2" stroke-width="3"/>
    <line x1="206" y1="206" x2="270" y2="206" stroke="#aab2c2" stroke-width="5" stroke-linecap="round"/>
    <circle cx="240" cy="350" r="5" fill="#82b366" opacity="0.55"/>
    <circle cx="231" cy="322" r="3.5" fill="#82b366" opacity="0.45"/>
    <circle cx="245" cy="300" r="2.6" fill="#82b366" opacity="0.35"/>
  </g>

  <!-- ===== RIGHT: beaker (blue-tinted glassware) ===== -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <clipPath id="clipBeaker"><path d="M918 320 L928 516 Q930 524 940 524 L1016 524 Q1026 524 1028 516 L1038 320 Z"/></clipPath>
    <g clip-path="url(#clipBeaker)">
      <path d="M915 408 Q978 398 1041 408 L1041 528 L915 528 Z" fill="#dae8fc" opacity="0.85"/>
      <path d="M915 408 Q978 398 1041 408" fill="none" stroke="#6c8ebf" stroke-width="2.5" opacity="0.8"/>
    </g>
    <path d="M912 318 L908 312 L922 318 L1034 318 L1048 312 L1044 318 L1028 516 Q1026 524 1016 524 L940 524 Q930 524 928 516 Z" fill="url(#glass)" stroke="#aab2c2" stroke-width="3"/>
    <line x1="932" y1="372" x2="950" y2="372" stroke="#b6bdcb" stroke-width="2"/>
    <line x1="930" y1="430" x2="948" y2="430" stroke="#b6bdcb" stroke-width="2"/>
    <line x1="929" y1="478" x2="947" y2="478" stroke="#b6bdcb" stroke-width="2"/>
    <circle cx="978" cy="386" r="5" fill="#6c8ebf" opacity="0.55"/>
    <circle cx="990" cy="358" r="3.5" fill="#6c8ebf" opacity="0.45"/>
    <circle cx="970" cy="338" r="2.6" fill="#6c8ebf" opacity="0.35"/>
  </g>

