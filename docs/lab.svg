        </g>
        <g id="lpxn-text" font-family="Helvetica,Arial,sans-serif" font-weight="bold" stroke="#ffffff" stroke-width="4.00" stroke-linejoin="round" paint-order="stroke">
          <text x="544.29" y="144.00" text-anchor="middle" dominant-baseline="central" font-size="46.00" fill="#aaaaaa">N</text>
          <text x="561.09" y="158.00" text-anchor="start" dominant-baseline="central" font-size="27.60" fill="#aaaaaa">e</text>
          <text x="217.80" y="835.50" text-anchor="middle" dominant-baseline="central" font-size="46.00" fill="#aaaaaa">N</text>
          <text x="234.60" y="849.50" text-anchor="start" dominant-baseline="central" font-size="27.60" fill="#aaaaaa">t</text>
          <text x="870.78" y="835.50" text-anchor="middle" dominant-baseline="central" font-size="46.00" fill="#aaaaaa">N</text>
          <text x="887.58" y="849.50" text-anchor="start" dominant-baseline="central" font-size="27.60" fill="#aaaaaa">c</text>
          <text x="451.17" y="611.51" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#4d8a3a">P</text>
          <text x="469.77" y="625.51" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#4d8a3a">(-C)</text>
          <text x="519.88" y="730.50" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#6c8ebf">X</text>
          <text x="538.48" y="744.50" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#6c8ebf">(+E)</text>
          <text x="595.80" y="598.99" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#6c8ebf">X</text>
          <text x="614.40" y="612.99" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#6c8ebf">(+E)</text>
          <text x="552.00" y="346.40" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#ff8000">L</text>
          <text x="527.10" y="272.92" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#4d8a3a">P</text>
          <text x="545.70" y="286.92" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#4d8a3a">(-C)</text>
          <text x="527.10" y="199.44" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#6c8ebf">X</text>
          <text x="545.70" y="213.44" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#6c8ebf">(+E)</text>
          <text x="278.34" y="790.62" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#4d8a3a">P</text>
          <text x="296.94" y="804.62" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#4d8a3a">(-C)</text>
          <text x="775.86" y="790.62" text-anchor="middle" dominant-baseline="central" font-size="52.00" fill="#6c8ebf">X</text>
          <text x="794.46" y="804.62" text-anchor="start" dominant-baseline="central" font-size="26.00" fill="#6c8ebf">(+E)</text>
          <text x="552.00" y="480.00" text-anchor="middle" dominant-baseline="central" font-size="60.00" fill="#ff8000">e</text>
          <text x="407.37" y="730.50" text-anchor="middle" dominant-baseline="central" font-size="60.00" fill="#4d8a3a">t</text>
          <text x="696.63" y="730.50" text-anchor="middle" dominant-baseline="central" font-size="60.00" fill="#6c8ebf">c</text>
        </g>
      </g>
    </g>

    <!-- glass outline + rim (on top, framing the contents) -->
    <path d="M566 250 L566 178 L556 168 L556 152 L644 152 L644 168 L634 178 L634 250 L790 560 Q792 590 762 590 L438 590 Q408 590 410 560 Z" fill="none" stroke="#8d97a8" stroke-width="3.5"/>
    <line x1="552" y1="152" x2="648" y2="152" stroke="#8d97a8" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- e/t/c node-bubbles rising out of the neck, shrinking linearly as they go up -->
  <g font-family="Helvetica,Inter,Segoe UI,Arial" font-weight="bold" text-anchor="middle">
    <!-- e — event / orange -->
    <g opacity="1">
      <circle cx="600" cy="133" r="15" fill="#ffe6cc" stroke="#ff8000" stroke-width="2"/>
      <text x="600" y="133" dominant-baseline="central" font-size="19" fill="#ff8000">e</text>
    </g>
    <!-- t — thing / green -->
    <g opacity="0.96">
      <circle cx="579" cy="102" r="12.5" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
      <text x="579" y="102" dominant-baseline="central" font-size="16" fill="#4d8a3a">t</text>
    </g>
    <!-- c — concept / blue -->
    <g opacity="0.9">
      <circle cx="618" cy="74" r="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
      <text x="618" y="74" dominant-baseline="central" font-size="13" fill="#3a78c2">c</text>
    </g>
    <!-- textless bubbles continuing the plume -->
    <circle cx="596" cy="49" r="7.5" fill="#ffe6cc" stroke="#ff8000" stroke-width="1.8" opacity="0.7"/>
    <circle cx="612" cy="27" r="5"   fill="#d5e8d4" stroke="#82b366" stroke-width="1.6" opacity="0.55"/>
  </g>

  <!-- ipmt token chips (echo of the code highlighting) -->
  <g font-family="'SFMono-Regular',Menlo,Consolas,'Liberation Mono',monospace" font-size="22">
    <rect x="356" y="652" width="156" height="44" rx="22" fill="#ffe6cc" opacity="0.55"/>
    <text x="378" y="681" fill="#ff8000" font-weight="bold">event<tspan fill="#9aa3b2" font-weight="normal"> ::</tspan><tspan fill="#ff8000">e</tspan></text>
    <rect x="528" y="652" width="146" height="44" rx="22" fill="#d5e8d4" opacity="0.55"/>
    <text x="550" y="681" fill="#4d8a3a" font-weight="bold">thing<tspan fill="#9aa3b2" font-weight="normal"> ::</tspan><tspan fill="#4d8a3a">t</tspan></text>
    <rect x="690" y="652" width="178" height="44" rx="22" fill="#dae8fc" opacity="0.55"/>
    <text x="712" y="681" fill="#3a78c2" font-weight="bold">concept<tspan fill="#9aa3b2" font-weight="normal"> ::</tspan><tspan fill="#3a78c2">c</tspan></text>
