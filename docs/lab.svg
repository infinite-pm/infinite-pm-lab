          <rect x="497.27" y="705.18" width="95.00" height="53.98" rx="16.19" fill="#f0f4f9"/>
          <rect x="573.20" y="573.67" width="95.00" height="53.98" rx="16.19" fill="#f0f4f9"/>
          <rect x="529.40" y="321.08" width="45.20" height="50.64" rx="15.19" fill="#fff2e6"/>
          <rect x="504.50" y="247.60" width="95.00" height="53.98" rx="16.19" fill="#edf3eb"/>
          <rect x="504.50" y="174.12" width="95.00" height="53.98" rx="16.19" fill="#f0f4f9"/>
          <rect x="255.74" y="765.30" width="95.00" height="53.98" rx="16.19" fill="#edf3eb"/>
          <rect x="753.26" y="765.30" width="95.00" height="53.98" rx="16.19" fill="#f0f4f9"/>
          <rect x="527.00" y="451.40" width="50.00" height="57.20" rx="17.16" fill="#fff2e6"/>
          <rect x="382.37" y="701.90" width="50.00" height="57.20" rx="17.16" fill="#edf3eb"/>
          <rect x="671.63" y="701.90" width="50.00" height="57.20" rx="17.16" fill="#f0f4f9"/>
        </g>
        <g id="lpxn-arrows">
          <path d="M 541.00 499.05 L 538.56 517.27 L 526.44 510.27 Z" fill="#4d8a3a"/>
          <path d="M 674.63 730.50 L 657.63 737.50 L 657.63 723.50 Z" fill="#6c8ebf"/>
          <path d="M 685.63 711.45 L 671.06 700.23 L 683.19 693.23 Z" fill="#6c8ebf"/>
          <path d="M 578.93 473.82 L 593.94 463.20 L 597.07 476.85 Z" fill="#ff8000"/>
